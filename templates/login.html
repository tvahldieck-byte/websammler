<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden – WebSammler</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width:400px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-collection-play text-primary" style="font-size:3rem;"></i>
        <h2 class="mt-2 fw-bold">WebSammler</h2>
        <p class="text-muted">Bitte melden Sie sich an</p>
      </div>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Passwort</label>
          <input type="password" name="password" class="form-control form-control-lg"
                 autofocus autocomplete="current-password" placeholder="Passwort eingeben">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">
          <i class="bi bi-box-arrow-in-right"></i> Anmelden
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
