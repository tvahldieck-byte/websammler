services:
  - type: web
    name: websammler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATA_DIR
        value: /tmp
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false
